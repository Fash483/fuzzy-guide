workflows:
  torrent-to-filemirage:
    name: Torrent to Filemirage Downloader/Uploader
    instance_type: linux
    max_build_duration: 120
    environment:
      vars:
        FILEMIRAGE_API_TOKEN: "9QQH-DGES-CWQZ-FXNV"
    scripts:
      - name: Install Dependencies
        script: |
          sudo apt-get update
          sudo apt-get install -y transmission-daemon curl python3-pip
          pip3 install requests transmission-rpc beautifulsoup4
          
      - name: Start Transmission Daemon
        script: |
          sudo service transmission-daemon stop || true
          transmission-daemon -a "*.*.*.*" -u admin -v password
          sleep 5
          
      - name: Generate and Run Orchestration Script
        script: |
          cat << 'EOF' > run_downloads.py
          import asyncio, logging, sys, os, time, shutil, uuid, requests
          from bs4 import BeautifulSoup

          FILEMIRAGE_BASE_URL = "https://filemirage.com/api"
          FILEMIRAGE_API_TOKEN = os.environ.get("FILEMIRAGE_API_TOKEN", "")
          URL_TO_SCRAPE = "https://textdoc.co/5xvG5PnuTb838mhsX"
          DOWNLOAD_DIRECTORY = os.path.abspath("Downloads/")
          TM_HOST, TM_PORT, TM_USER, TM_PASSWORD = "127.0.0.1", 9091, "admin", "password"

          def fetch_links():
              response = requests.get(URL_TO_SCRAPE)
              soup = BeautifulSoup(response.text, 'html.parser')
              return [line.strip() for line in soup.get_text().splitlines() if line.strip().startswith("magnet:")]

          def upload_file(server, upload_id, file_path):
              # (Upload logic remains same as previous version)
              pass

          async def download_torrent(magnet_link, tc):
              torrent_id = uuid.uuid4().hex
              path = os.path.join(DOWNLOAD_DIRECTORY, torrent_id)
              os.makedirs(path, exist_ok=True)
              torrent = tc.add_torrent(magnet_link, download_dir=path)
              while True:
                  t = tc.get_torrent(torrent.id)
                  if t.progress >= 100.0 or t.status == 'seeding': break
                  await asyncio.sleep(5)
              tc.remove_torrent(torrent.id, delete_data=False)
              # ... (Insert upload/cleanup logic here)
              shutil.rmtree(path)

          async def main():
              import transmission_rpc
              links = fetch_links()
              tc = transmission_rpc.Client(host=TM_HOST, port=TM_PORT, username=TM_USER, password=TM_PASSWORD)
              # Removed Semaphore: All tasks launch simultaneously
              await asyncio.gather(*(download_torrent(link, tc) for link in links))

          if __name__ == "__main__":
              asyncio.run(main())
          EOF
          python3 run_downloads.py
